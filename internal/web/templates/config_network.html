{{define "title"}}Network — Trainboard{{end}}
{{define "content"}}
<div class="cfgwrap">
{{template "confignav" "network"}}
<div class="cfgdetail">
<div class="backrow"><a href="/config">&lsaquo; Configuration</a></div>
<h3>Network</h3>
{{if .Error}}<p class="error">{{.Error}}</p>{{end}}
<form method="post" action="/config/network">
<input type="hidden" name="csrf" value="{{.CSRF}}">
{{if .NeedsOrigin}}
<label class="f">Station (needed to finish setup)
  <input class="crs" type="text" name="board.origin" value="{{.Cfg.Board.Origin}}" maxlength="3" pattern="[A-Za-z]{3}">
  <div class="hint">3-letter station code, e.g. PAD &mdash; this board has no station configured yet</div>
</label>
{{end}}
<label class="f">WiFi network name
  <input type="text" name="wifi.ssid" value="{{.Cfg.Wifi.SSID}}" maxlength="32">
</label>
<label class="f">WiFi password
  <input type="password" name="wifi.psk" placeholder="unchanged" autocomplete="off">
</label>
<label class="f">Darwin API token
  <input type="password" name="darwin.token" placeholder="unchanged" autocomplete="off">
  <div class="hint"><a href="https://realtime.nationalrail.co.uk/OpenLDBWSRegistration/" target="_blank" rel="noopener noreferrer">Register for a free Darwin token</a></div>
</label>
<div class="savebar">
  <span class="consequence">Restarts the board. If the WiFi details are wrong it falls back to its setup hotspot.</span>
  <button class="btn" type="submit">Save</button>
</div>
</form>
</div>
</div>
{{end}}
