{{define "title"}}setup — trainboard{{end}}
{{define "content"}}
<h2>First-time setup</h2>
{{if .Error}}<p class="error">{{.Error}}</p>{{end}}
<form method="post" action="/setup">
  <label>Admin password (min 8 chars) <input type="password" name="password" required minlength="8"></label>
  <label>Confirm password <input type="password" name="confirm" required></label>
  <label>Station code (CRS, e.g. PAD) <input type="text" name="origin" required maxlength="3" pattern="[A-Za-z]{3}"></label>
  <label>Darwin API token (from the National Rail OpenLDBWS registration email) <input type="password" name="token" required autocomplete="off"></label>
  <button type="submit">Save and continue</button>
</form>
{{end}}
