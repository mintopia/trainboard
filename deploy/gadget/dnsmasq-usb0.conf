# DHCP-only dnsmasq instance scoped to the USB gadget's usb0/usb1 interfaces
# (docs/superpowers/plans/2026-07-08-m4-otg-mdns.md). usb0 (NCM) and usb1
# (ECM, legacy fallback) are the two function netdevs trainboard-gadget.sh
# brings up — only one is ever active per host (config c.1 vs. c.2), so
# both share the same point-to-point address and this single dnsmasq
# instance serves whichever one the host actually negotiated. Kept
# strictly separate from the AP-mode dnsmasq instance rendered by
# internal/net/dnsmasq.go (wlan0, its own conf/pid file) — different
# interfaces, bind-interfaces on both sides, so the two can run
# concurrently without fighting over sockets or leases.
#
# No router or DNS options are pushed: usb0/usb1 are point-to-point links
# to a single host machine, not a gateway to anything, and mDNS (not DNS)
# is how the board is found on it.
interface=usb0
interface=usb1
bind-interfaces
port=0
dhcp-range=10.55.0.2,10.55.0.6,12h
dhcp-option=option:router
dhcp-option=option:dns-server
leasefile-ro
