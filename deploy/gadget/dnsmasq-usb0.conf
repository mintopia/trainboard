# DHCP-only dnsmasq instance scoped to the USB gadget's usb0 interface
# (docs/superpowers/plans/2026-07-08-m4-otg-mdns.md). Kept strictly separate
# from the AP-mode dnsmasq instance rendered by internal/net/dnsmasq.go
# (wlan0, its own conf/pid file) — different interface, bind-interfaces on
# both sides, so the two can run concurrently without fighting over
# sockets or leases.
#
# No router or DNS options are pushed: usb0 is a point-to-point link to a
# single host machine, not a gateway to anything, and mDNS (not DNS) is how
# the board is found on it.
interface=usb0
bind-interfaces
port=0
dhcp-range=10.55.0.2,10.55.0.6,12h
dhcp-option=option:router
dhcp-option=option:dns-server
leasefile-ro
